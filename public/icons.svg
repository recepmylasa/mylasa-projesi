<!-- public/icons.svg -->
<!-- Tek kaynaklı ikon sprite: tüm ikonlar stroke tabanlı, currentColor kullanır.
     Bu dosya public/ altında servis edilir: /icons.svg#p-<id> -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <defs>
    <style>
      .ph{ fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
      .phf{ fill:currentColor; stroke:none; }
    </style>
  </defs>

  <!-- GRID -->
  <symbol id="p-grid" viewBox="0 0 24 24">
    <rect class="ph" x="3" y="3" width="7.5" height="7.5" rx="1.2"/>
    <rect class="ph" x="13.5" y="3" width="7.5" height="7.5" rx="1.2"/>
    <rect class="ph" x="3" y="13.5" width="7.5" height="7.5" rx="1.2"/>
    <rect class="ph" x="13.5" y="13.5" width="7.5" height="7.5" rx="1.2"/>
  </symbol>

  <!-- REELS -->
  <symbol id="p-reels" viewBox="0 0 24 24">
    <rect class="ph" x="3" y="4" width="18" height="16" rx="3"/>
    <path class="phf" d="M10 9 15 12 10 15Z"/>
  </symbol>

  <!-- TAGGED -->
  <symbol id="p-tagged" viewBox="0 0 24 24">
    <path class="ph" d="M20 12 12 20 4 12 12 4 20 12Z"/>
    <circle class="phf" cx="12" cy="12" r="2.2"/>
  </symbol>

  <!-- HEART -->
  <symbol id="p-heart" viewBox="0 0 24 24">
    <path class="ph" d="M20.5 8.6c-1-2.4-3.9-3.2-6-1.6L12 9.3l-2.5-2.3c-2.1-1.6-5-.8-6 1.6-.9 2 .1 4.3 1.8 5.8L12 21l6.7-6.6c1.7-1.5 2.7-3.8 1.8-5.8Z"/>
  </symbol>

  <!-- MESSAGE -->
  <symbol id="p-message" viewBox="0 0 24 24">
    <path class="ph" d="M3 12 21 4l-4.5 16-5.5-5.5L3 12Z"/>
    <path class="ph" d="M21 4l-9 8"/>
  </symbol>

  <!-- LOCATION -->
  <symbol id="p-location" viewBox="0 0 24 24">
    <path class="ph" d="M12 21s-6-5.1-6-10a6 6 0 1 1 12 0c0 4.9-6 10-6 10Z"/>
    <circle class="ph" cx="12" cy="11" r="2.5"/>
  </symbol>

  <!-- SHARE -->
  <symbol id="p-share" viewBox="0 0 24 24">
    <path class="ph" d="M3 12 21 4l-5 8 5 8-18-8Z"/>
  </symbol>

  <!-- PLUS -->
  <symbol id="p-plus" viewBox="0 0 24 24">
    <path class="ph" d="M12 5v14M5 12h14"/>
  </symbol>

  <!-- STORY -->
  <symbol id="p-story" viewBox="0 0 24 24">
    <circle class="ph" cx="12" cy="12" r="9"/>
    <circle class="ph" cx="12" cy="12" r="3"/>
  </symbol>

  <!-- HIGHLIGHT -->
  <symbol id="p-highlight" viewBox="0 0 24 24">
    <circle class="ph" cx="12" cy="12" r="9"/>
    <path class="ph" d="M7 12h10"/>
  </symbol>

  <!-- LIVE -->
  <symbol id="p-live" viewBox="0 0 24 24">
    <rect class="ph" x="3" y="7" width="18" height="10" rx="3"/>
    <path class="ph" d="M8 12h8"/>
  </symbol>

  <!-- ADS -->
  <symbol id="p-ads" viewBox="0 0 24 24">
    <rect class="ph" x="4" y="6" width="16" height="12" rx="2"/>
    <path class="ph" d="M6 9h12"/>
  </symbol>

  <!-- CHANNEL -->
  <symbol id="p-channel" viewBox="0 0 24 24">
    <path class="ph" d="M4 7h16v10H4Z"/>
    <path class="ph" d="M8 11h8"/>
  </symbol>

  <!-- QR -->
  <symbol id="p-qr" viewBox="0 0 24 24">
    <path class="ph" d="M3 3h6v6H3zM15 3h6v6h-6zM3 15h6v6H3z"/>
    <path class="ph" d="M15 15h3v3h3"/>
  </symbol>

  <!-- EXTERNAL LINK -->
  <symbol id="p-external-link" viewBox="0 0 24 24">
    <path class="ph" d="M14 3h7v7"/>
    <path class="ph" d="M10 14 21 3"/>
    <path class="ph" d="M20 14v6a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V8a1 1 0 0 1 1-1h6"/>
  </symbol>

  <!-- CLIP BADGE -->
  <symbol id="p-clip-badge" viewBox="0 0 24 24">
    <rect class="ph" x="4" y="6" width="16" height="12" rx="3"/>
    <path class="phf" d="M11 10.5v3l3-1.5-3-1.5Z"/>
  </symbol>

  <!-- STAR -->
  <symbol id="p-star" viewBox="0 0 24 24">
    <path class="ph" d="M12 17.3 18.2 21 16.5 13.9 22 9.2l-7.2-.6L12 2 9.2 8.6 2 9.2l5.5 4.7L5.8 21 12 17.3Z"/>
  </symbol>

  <!-- BOOKMARK (SAVED) -->
  <symbol id="p-bookmark" viewBox="0 0 24 24">
    <path class="ph" d="M6 3h12a2 2 0 0 1 2 2v16l-8-4-8 4V5a2 2 0 0 1 2-2Z"/>
  </symbol>

  <!-- COMMENT -->
  <symbol id="p-comment" viewBox="0 0 24 24">
    <path class="ph" d="M21 7a3 3 0 0 0-3-3H6A3 3 0 0 0 3 7v8a3 3 0 0 0 3 3h8l5 3V7Z"/>
  </symbol>

  <!-- KEBAB (HORIZONTAL / VERTICAL) -->
  <symbol id="p-menu" viewBox="0 0 24 24">
    <circle class="phf" cx="5" cy="12" r="1.9"/>
    <circle class="phf" cx="12" cy="12" r="1.9"/>
    <circle class="phf" cx="19" cy="12" r="1.9"/>
  </symbol>
  <symbol id="p-menu-vertical" viewBox="0 0 24 24">
    <circle class="phf" cx="12" cy="5" r="1.9"/>
    <circle class="phf" cx="12" cy="12" r="1.9"/>
    <circle class="phf" cx="12" cy="19" r="1.9"/>
  </symbol>
</svg>
