<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Web site created using create-react-app" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Google Fonts - Cookie (Mylasa logosu için) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cookie&display=swap" rel="stylesheet">

    <title>React App</title>

    <!-- Global UI Patch: tek menü, saat gizle, üstüne binmeleri düzelt -->
    <style id="ui-guard-css">
      /* Yorum menüsü en üste çıksın */
      .clip-cmMenu { z-index: 5000 !important; }

      /* IG tarzı sheet ve yıldız panelleri de güvene al */
      .sheet-list { z-index: 5100 !important; position: relative; }
      .sr2-panel, .sr2-root + .sr2-panel { z-index: 5200 !important; }

      /* Yorum satırlarındaki saatleri gizle */
      .clip-comment-time { display: none !important; }

      /* Sağ alttaki zaman (footer) yazısını gizle */
      .clip-time { display: none !important; }

      /* Dışsal kapatma zorlaması için (JS bu attribute’u ekler/siler) */
      .clip-cmMenu[data-forced-hidden="1"] { display: none !important; }

      /* Bazı projelerde menü animasyonundan dolayı visibility kullanılıyor olabilir */
      .clip-cmMenu[data-forced-hidden="1"] { visibility: hidden !important; opacity: 0 !important; }
    </style>
  </head>
  <body>
    <noscript>Bu uygulamayı çalıştırmak için JavaScript’i etkinleştir.</noscript>
    <div id="root"></div>

    <!-- Global UI Guard: yalnızca tek menü açık kalsın, dışarı tıklayınca kapan-sın -->
    <script id="ui-guard-script">
      (function () {
        // Yalnızca bir kez çalışsın
        if (window.__uiGuardInstalled) return;
        window.__uiGuardInstalled = true;

        const SELECTOR_MENU = '.clip-cmMenu';

        function allMenus() {
          return Array.from(document.querySelectorAll(SELECTOR_MENU));
        }

        function forceCloseAll(except = null) {
          allMenus().forEach(m => {
            if (m === except) return;
            m.setAttribute('data-forced-hidden', '1');
          });
        }

        function clearForceClose(menu) {
          if (menu && menu.getAttribute('data-forced-hidden') === '1') {
            menu.removeAttribute('data-forced-hidden');
          }
        }

        // 1) Her pointer down’da (capture) önce eski menüleri kapat.
        //    Böylece aynı tıkla yeni satırın menüsü açılırken eskiler kapanmış olur.
        window.addEventListener('pointerdown', function (e) {
          const insideMenu = e.target.closest(SELECTOR_MENU);
          if (insideMenu) return; // menü içi ise kapatma

          // Her tıklamada tüm menüleri gizle (React state'e dokunmadan, sadece görünürlüğü kesiyoruz)
          forceCloseAll(null);
        }, true); // capture önemli

        // 2) ESC tuşu ile de kapat
        window.addEventListener('keydown', function (e) {
          if (e.key === 'Escape') forceCloseAll(null);
        }, true);

        // 3) Yeni bir menü DOM’a geldiğinde diğerlerini kapat, kendisini görünür yap.
        const obs = new MutationObserver((mutList) => {
          // Her değişiklikte ekranda görünen menüler var mı bak
          const menus = allMenus();

          // Görünür olanları bul
          const visible = menus.filter(m => {
            const cs = getComputedStyle(m);
            const rect = m.getBoundingClientRect();
            return cs.display !== 'none' && cs.visibility !== 'hidden' && rect.width > 0 && rect.height > 0;
          });

          if (visible.length > 0) {
            // En son eklenen/görünen menüyü açık say, diğerlerini kapat
            const last = visible[visible.length - 1];
            clearForceClose(last);
            visible.forEach(m => { if (m !== last) m.setAttribute('data-forced-hidden', '1'); });
          }
        });

        obs.observe(document.documentElement, {
          subtree: true,
          childList: true,
          attributes: true,
          attributeFilter: ['style', 'class', 'data-open']
        });
      })();
    </script>
  </body>
</html>
